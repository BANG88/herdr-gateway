id = "herdr.gateway"
name = "Herdr Gateway"
version = "0.3.0"
min_herdr_version = "0.7.0"
description = "Expose a token-protected mobile gateway API for Herdr."
platforms = ["linux", "macos"]

[[build]]
command = ["cargo", "build", "--release"]

[[actions]]
id = "setup"
title = "Setup Gateway"
contexts = ["workspace"]
command = ["./target/release/herdr-gateway", "setup"]

[[actions]]
id = "start"
title = "Start Gateway"
contexts = ["workspace"]
command = ["./target/release/herdr-gateway", "start"]

[[actions]]
id = "stop"
title = "Stop Gateway"
contexts = ["workspace"]
command = ["./target/release/herdr-gateway", "stop"]

[[actions]]
id = "status"
title = "Gateway Status"
contexts = ["workspace"]
command = ["./target/release/herdr-gateway", "status"]

[[panes]]
id = "manage"
title = "Gateway Manager"
placement = "popup"
width = 78
height = 48
command = ["./target/release/herdr-gateway", "manage"]

[[panes]]
id = "foreground"
title = "Gateway Foreground"
placement = "tab"
command = ["./target/release/herdr-gateway", "run"]
