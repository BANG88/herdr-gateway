name: release

# Build the gateway for macOS and Linux on every version tag and attach the
# binaries to the GitHub release. The plugin's build step then downloads the
# matching binary instead of compiling from source, so installing needs no Rust
# toolchain.
#
# Linux targets are statically linked against musl (built via `cross`) so the
# binary has no glibc version dependency and runs on any Linux, old or new. A
# glibc build made on a newer runner would fail on older hosts with
# "GLIBC_2.xx not found". macOS builds natively with cargo.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            builder: cargo
          - os: macos-14
            target: x86_64-apple-darwin
            builder: cargo
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            builder: cross
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            builder: cross
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        if: matrix.builder == 'cargo'
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.builder == 'cross'
        run: cargo install cross --locked

      - name: Build (cargo)
        if: matrix.builder == 'cargo'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross, static musl)
        if: matrix.builder == 'cross'
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        run: cp "target/${{ matrix.target }}/release/herdr-gateway" "herdr-gateway-${{ matrix.target }}"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: herdr-gateway-${{ matrix.target }}
