name: release

# Build the gateway for macOS and Linux on every version tag and attach the
# binaries to the GitHub release. The plugin's build step then downloads the
# matching binary instead of compiling from source, so installing needs no Rust
# toolchain.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cross linker for linux arm64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        run: cp "target/${{ matrix.target }}/release/herdr-gateway" "herdr-gateway-${{ matrix.target }}"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: herdr-gateway-${{ matrix.target }}
